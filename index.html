<!DOCTYPE html>
<html>
<head>
	<title>Student Details and Marks</title>
	<style>
		table {
			border-collapse: collapse;
		}
		th, td {
			border: 1px solid black;
			padding: 10px;
		}
	</style>
</head>
<body>
	<h1>Student Details and Marks</h1>
	<table>
		<tr>
			<th>Roll No.</th>
			<th>Name</th>
			<th>Maths</th>
			<th>Science</th>
			<th>English</th>
			<th>Total</th>
			<th>Percentage</th>
		</tr>
		<tr>
			<td>1</td>
			<td>John Doe</td>
			<td>85</td>
			<td>90</td>
			<td>78</td>
			<td>253</td>
			<td>84.33%</td>
		</tr>
		<tr>
			<td>2</td>
			<td>Jane Smith</td>
			<td>90</td>
			<td>92</td>
			<td>88</td>
			<td>270</td>
			<td>90%</td>
		</tr>
	</table>
</body>
</html>
